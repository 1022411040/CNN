<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NeuralCanvas | Dynamic Image Classifier</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: radial-gradient(circle at 10% 20%, rgba(15, 25, 55, 1) 0%, rgba(5, 12, 30, 1) 100%);
            min-height: 100vh;
            padding: 2rem 1.5rem;
            position: relative;
        }

        /* animated background grain */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48ZmlsdGVyIGlkPSJmIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjciIG51bU9jdGF2ZXM9IjMiLz48L2ZpbHRlcj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWx0ZXI9InVybCgjZikiIG9wYWNpdHk9IjAuMDYiLz48L3N2Zz4=');
            background-repeat: repeat;
            pointer-events: none;
            opacity: 0.35;
            z-index: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(18, 25, 55, 0.65);
            backdrop-filter: blur(14px);
            border-radius: 2.5rem;
            padding: 2rem 2rem 2.2rem;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
            position: relative;
            z-index: 2;
        }

        header {
            text-align: center;
            margin-bottom: 2.8rem;
        }

        h1 {
            background: linear-gradient(135deg, #FFFFFF 0%, #B4C6FF 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            display: inline-flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 12px;
        }

        h1 i {
            background: linear-gradient(145deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 2.4rem;
        }

        .subtitle {
            color: #a5b4fc;
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 0.3px;
            border-bottom: 1px dashed rgba(165, 180, 252, 0.3);
            display: inline-block;
            padding-bottom: 2px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 2.5rem;
        }

        @media (max-width: 880px) {
            body { padding: 1rem; }
            .container { padding: 1.5rem; }
            .dashboard { grid-template-columns: 1fr; gap: 1.8rem; }
            h1 { font-size: 2rem; }
        }

        .card {
            background: rgba(12, 20, 45, 0.7);
            backdrop-filter: blur(4px);
            border-radius: 1.8rem;
            padding: 1.6rem 1.8rem;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.4);
            transition: transform 0.2s ease, border-color 0.2s;
        }

        .card:hover {
            border-color: rgba(129, 140, 248, 0.5);
            background: rgba(15, 25, 55, 0.75);
        }

        .card h2 {
            color: #eef2ff;
            font-weight: 600;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: -0.2px;
            border-left: 4px solid #818cf8;
            padding-left: 1rem;
        }

        .card h2 i {
            color: #a78bfa;
            font-size: 1.5rem;
        }

        /* modern forms */
        .add-class-form {
            display: flex;
            gap: 12px;
            margin-bottom: 1.8rem;
            flex-wrap: wrap;
        }

        .add-class-form input {
            flex: 1;
            padding: 12px 18px;
            background: rgba(0, 0, 0, 0.4);
            border: 1.5px solid rgba(255, 255, 255, 0.15);
            border-radius: 60px;
            font-size: 0.95rem;
            color: white;
            font-weight: 500;
            transition: all 0.2s;
        }

        .add-class-form input:focus {
            outline: none;
            border-color: #818cf8;
            box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.3);
            background: rgba(0, 0, 0, 0.6);
        }

        .add-class-form input::placeholder {
            color: #94a3b8;
            font-weight: 400;
        }

        .btn {
            padding: 10px 22px;
            border: none;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(8px);
        }

        .btn-primary {
            background: linear-gradient(105deg, #4f46e5, #7c3aed);
            color: white;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            background: linear-gradient(105deg, #6366f1, #8b5cf6);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4);
        }

        .btn-success {
            background: linear-gradient(105deg, #059669, #10b981);
            color: white;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .btn-success:hover {
            transform: translateY(-2px);
            background: linear-gradient(105deg, #10b981, #34d399);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.9);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 100, 100, 0.4);
            color: white;
        }

        .btn-danger:hover {
            background: #ef4444;
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(239, 68, 68, 0.3);
        }

        .class-list {
            list-style: none;
            max-height: 320px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .class-list::-webkit-scrollbar {
            width: 5px;
        }

        .class-list::-webkit-scrollbar-track {
            background: #1e293b;
            border-radius: 10px;
        }

        .class-list::-webkit-scrollbar-thumb {
            background: #818cf8;
            border-radius: 10px;
        }

        .class-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 18px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s;
        }

        .class-item:hover {
            background: rgba(129, 140, 248, 0.15);
            border-color: rgba(129, 140, 248, 0.4);
        }

        .class-info {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #e2e8f0;
            font-weight: 500;
        }

        .class-badge {
            background: rgba(129, 140, 248, 0.25);
            color: #c7d2fe;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            backdrop-filter: blur(4px);
        }

        /* Upload area premium */
        .upload-area {
            border: 2px dashed rgba(129, 140, 248, 0.6);
            border-radius: 2rem;
            padding: 2rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 1.5rem;
            background: rgba(0, 0, 0, 0.25);
        }

        .upload-area:hover {
            border-color: #a78bfa;
            background: rgba(129, 140, 248, 0.1);
            transform: scale(1.01);
        }

        .upload-area i {
            font-size: 3rem;
            background: linear-gradient(145deg, #a5b4fc, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
        }

        .upload-area p {
            color: #cbd5e1;
        }

        .file-name {
            color: #c084fc !important;
            font-weight: 600;
            margin-top: 8px;
        }

        /* results modern */
        .results {
            display: none;
            margin-top: 20px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 18px;
            margin-bottom: 12px;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(8px);
            border-radius: 1.2rem;
            border-left: 5px solid #818cf8;
            transition: all 0.2s;
            color: #ffffff;
        }

        .confidence-bar {
            height: 8px;
            background: #2d3a5e;
            border-radius: 8px;
            overflow: hidden;
            width: 180px;
            margin-top: 6px;
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #818cf8, #c084fc);
            border-radius: 8px;
            transition: width 0.7s cubic-bezier(0.22, 0.97, 0.36, 1);
        }

        /* loading spinner premium */
        .loading {
            display: none;
            text-align: center;
            padding: 2rem;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(129, 140, 248, 0.2);
            border-top: 3px solid #a78bfa;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }

        /* status badges */
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 10px;
            box-shadow: 0 0 6px currentColor;
        }

        .status-online {
            background: #34d399;
            box-shadow: 0 0 8px #34d399;
        }

        .status-offline {
            background: #f87171;
        }

        .alert {
            padding: 14px 20px;
            border-radius: 60px;
            margin-bottom: 1.8rem;
            display: none;
            font-weight: 500;
            backdrop-filter: blur(12px);
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.2);
            color: #a7f3d0;
            border: 1px solid rgba(16, 185, 129, 0.5);
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.2);
            color: #fecaca;
            border: 1px solid rgba(239, 68, 68, 0.5);
        }

        .controls {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 2rem;
        }

        .statistics {
            display: flex;
            gap: 1.2rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        .stat-box {
            text-align: center;
            padding: 1rem 1.6rem;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            border-radius: 2rem;
            min-width: 130px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #e0e7ff, #a5b4fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 4px;
        }

        .stat-label {
            color: #94a3b8;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-item {
            animation: fadeSlide 0.3s ease forwards;
        }

        button:disabled {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
        }

        small {
            color: #7e8aa2;
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 0.8rem;
        }

        .flex-btns {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .card h3 {
            color: #cbd5f0;
            font-size: 1rem;
            margin: 0 0 10px 6px;
            font-weight: 500;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
    
    <div id="alert" class="alert"></div>

    <div class="dashboard">
        <!-- Class Management -->
        <div class="card">
            <h2><i class="fas fa-cubes"></i> Class Studio</h2>
            <div class="add-class-form">
                <input type="text" id="className" placeholder="e.g., 'astronaut', 'ocean', 'panda'" autocomplete="off">
                <button onclick="addClass()" class="btn btn-primary"><i class="fas fa-plus-circle"></i> Add Class</button>
            </div>
            <h3><i class="fas fa-tag"></i> Active classes</h3>
            <ul id="classList" class="class-list"></ul>
            <div style="text-align: center; margin-top: 24px;">
                <button onclick="trainModel()" class="btn btn-success" style="width: 100%;"><i class="fas fa-brain"></i> Train Model</button>
                <small style="display: block; margin-top: 12px;">⚡ needs ≥2 classes with images</small>
            </div>
        </div>

        <!-- Classification Panel -->
        <div class="card">
            <h2><i class="fas fa-rocket"></i> Classify Any Image</h2>
            <div class="upload-area" onclick="document.getElementById('fileInput').click()" id="uploadArea">
                <i class="fas fa-cloud-upload-alt"></i>
                <p>drag & drop or click to browse</p>
                <p style="font-size: 0.75rem;">JPG, PNG</p>
                <p class="file-name" id="fileName">✨ no file chosen</p>
            </div>
            <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="handleFileSelect(event)">

            <div id="results" class="results">
                <h3 style="margin-bottom: 14px;"><i class="fas fa-chart-simple"></i> Predictions</h3>
                <div id="predictions"></div>
            </div>

            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p id="loadingText" style="color: #b9c8ff;">processing...</p>
            </div>

            <div class="flex-btns">
                <button onclick="predictImage()" class="btn btn-primary" id="predictBtn" disabled style="flex:1;"><i class="fas fa-magic"></i> Classify</button>
                <button onclick="clearResults()" class="btn btn-danger" style="flex:1;"><i class="fas fa-trash-alt"></i> Clear</button>
            </div>
        </div>
    </div>

    <!-- System Status Card -->
    <div class="card" style="margin-bottom: 1.8rem;">
        <h2><i class="fas fa-microchip"></i> Inference Core</h2>
        <div class="statistics">
            <div class="stat-box">
                <div class="stat-number" id="classCount">0</div>
                <div class="stat-label">Classes</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="modelStatus">No</div>
                <div class="stat-label">Model Active</div>
            </div>
            <div class="stat-box">
                <div id="apiStatus" class="status-indicator status-offline" style="display: inline-block; vertical-align: middle;"></div>
                <div class="stat-number" style="font-size: 1.2rem;">API</div>
                <div class="stat-label">Connection</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button onclick="loadClasses()" class="btn btn-primary"><i class="fas fa-sync-alt"></i> Refresh</button>
        <button onclick="checkModelStatus()" class="btn btn-primary"><i class="fas fa-microscope"></i> Model Health</button>
        <button onclick="reloadModel()" class="btn btn-primary"><i class="fas fa-redo-alt"></i> Reload Weights</button>
    </div>
</div>

<script>
    const API_BASE_URL = 'http://localhost:8000';
    let selectedFile = null;

    document.addEventListener('DOMContentLoaded', function() {
        loadClasses();
        checkAPIStatus();
        checkModelStatus();
    });

    async function checkAPIStatus() {
        try {
            const response = await fetch(`${API_BASE_URL}/health`);
            if (response.ok) {
                const apiDot = document.getElementById('apiStatus');
                apiDot.className = 'status-indicator status-online';
                showAlert('API connected · ready', 'success');
            } else throw new Error();
        } catch (error) {
            document.getElementById('apiStatus').className = 'status-indicator status-offline';
            showAlert('API offline — start server', 'error');
        }
    }

    async function addClass() {
        const className = document.getElementById('className').value.trim();
        if (!className) { showAlert('Enter a valid class name', 'error'); return; }
        try {
            showLoading('Adding class & crawling images...');
            const response = await fetch(`${API_BASE_URL}/classes/add?class_name=${encodeURIComponent(className)}`, { method: 'POST' });
            const data = await response.json();
            if (response.ok) {
                showAlert(`✓ Class "${className}" added. ${data.message || ''}`, 'success');
                document.getElementById('className').value = '';
                loadClasses();
                setTimeout(checkModelStatus, 1000);
            } else showAlert(data.detail || 'Failed', 'error');
        } catch (error) { showAlert('Server error', 'error'); } finally { hideLoading(); }
    }

    async function loadClasses() {
        try {
            const response = await fetch(`${API_BASE_URL}/classes`);
            const data = await response.json();
            if (response.ok) {
                const classList = document.getElementById('classList');
                classList.innerHTML = '';
                data.classes.forEach(cls => {
                    const li = document.createElement('li');
                    li.className = 'class-item';
                    li.innerHTML = `<div class="class-info"><span>${escapeHtml(cls.name)}</span><span class="class-badge">📸 ${cls.image_count}</span></div>
                                    <div><span style="color:#a5b4fc; font-size:0.75rem;">ID: ${cls.id}</span></div>`;
                    classList.appendChild(li);
                });
                document.getElementById('classCount').textContent = data.total;
                if (data.total === 0) classList.innerHTML = '<li style="text-align:center; padding:1.5rem; opacity:0.7;">✨ no classes yet</li>';
            }
        } catch (error) { console.error(error); }
    }

    async function trainModel() {
        try {
            showLoading('🚀 training neural model ...');
            const response = await fetch(`${API_BASE_URL}/train`, { method: 'POST' });
            const data = await response.json();
            if (response.ok) {
                showAlert(`Training started! ${data.message}`, 'success');
                pollTrainingStatus();
            } else { showAlert(data.detail || 'training failed', 'error'); hideLoading(); }
        } catch (error) { showAlert('training error', 'error'); hideLoading(); }
    }

    function pollTrainingStatus() {
        const interval = setInterval(async () => {
            try {
                const res = await fetch(`${API_BASE_URL}/models/status`);
                const data = await res.json();
                if (data.status === 'loaded') {
                    clearInterval(interval);
                    hideLoading();
                    showAlert('✅ Model ready!', 'success');
                    checkModelStatus();
                }
            } catch (e) {}
        }, 4000);
    }

    function handleFileSelect(event) {
        selectedFile = event.target.files[0];
        if (selectedFile) {
            document.getElementById('fileName').textContent = selectedFile.name;
            document.getElementById('uploadArea').style.borderColor = '#a78bfa';
            document.getElementById('predictBtn').disabled = false;
        }
    }

    async function predictImage() {
        if (!selectedFile) { showAlert('Select an image', 'error'); return; }
        const statusResp = await fetch(`${API_BASE_URL}/models/status`);
        const statusData = await statusResp.json();
        if (statusData.status !== 'loaded') { showAlert('No trained model — please train first', 'error'); return; }
        const formData = new FormData();
        formData.append('file', selectedFile);
        try {
            showLoading('🧠 classifying ...');
            const response = await fetch(`${API_BASE_URL}/predict?top_k=5`, { method: 'POST', body: formData });
            const data = await response.json();
            if (response.ok) displayPredictions(data);
            else showAlert(data.detail || 'prediction error', 'error');
        } catch (error) { showAlert('prediction failed', 'error'); } finally { hideLoading(); }
    }

    function displayPredictions(data) {
        const resultsDiv = document.getElementById('results');
        const predictionsDiv = document.getElementById('predictions');
        resultsDiv.style.display = 'block';
        predictionsDiv.innerHTML = '';
        data.predictions.forEach((pred, idx) => {
            const confPercent = (pred.confidence * 100).toFixed(1);
            const div = document.createElement('div');
            div.className = 'result-item';
            div.innerHTML = `
                <div><strong style="font-size:1.1rem;">🏷️ ${escapeHtml(pred.class)}</strong><div style="font-size:0.75rem; color:#9aa9c1;">class ID ${pred.class_id}</div></div>
                <div style="text-align:right;"><span style="font-weight:800; font-size:1.3rem; background:linear-gradient(145deg,#c4b5fd,#a78bfa); -webkit-background-clip:text; background-clip:text; color:transparent;">${confPercent}%</span>
                <div class="confidence-bar"><div class="confidence-fill" style="width: ${confPercent}%;"></div></div></div>`;
            predictionsDiv.appendChild(div);
        });
        resultsDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    async function checkModelStatus() {
        try {
            const res = await fetch(`${API_BASE_URL}/models/status`);
            const data = await res.json();
            const modelSpan = document.getElementById('modelStatus');
            if (data.status === 'loaded') { modelSpan.textContent = 'Yes'; modelSpan.style.color = '#34d399'; }
            else { modelSpan.textContent = 'No'; modelSpan.style.color = '#f87171'; }
        } catch(e) { document.getElementById('modelStatus').textContent = 'Error'; }
    }

    async function reloadModel() {
        try {
            showLoading('reloading model artifacts...');
            const res = await fetch(`${API_BASE_URL}/reload`, { method: 'POST' });
            const data = await res.json();
            if (res.ok) { showAlert('Model reloaded', 'success'); checkModelStatus(); }
            else showAlert(data.detail || 'reload error', 'error');
        } catch(e) { showAlert('reload failed', 'error'); } finally { hideLoading(); }
    }

    function clearResults() {
        document.getElementById('results').style.display = 'none';
        document.getElementById('predictions').innerHTML = '';
        document.getElementById('fileInput').value = '';
        document.getElementById('fileName').textContent = '✨ no file chosen';
        document.getElementById('uploadArea').style.borderColor = 'rgba(129, 140, 248, 0.6)';
        document.getElementById('predictBtn').disabled = true;
        selectedFile = null;
    }

    function showAlert(msg, type) {
        const alertDiv = document.getElementById('alert');
        alertDiv.textContent = msg;
        alertDiv.className = `alert alert-${type}`;
        alertDiv.style.display = 'block';
        setTimeout(() => { alertDiv.style.display = 'none'; }, 4800);
    }

    function showLoading(msg = 'Processing...') {
        document.getElementById('loading').style.display = 'block';
        document.getElementById('loadingText').textContent = msg;
    }
    function hideLoading() { document.getElementById('loading').style.display = 'none'; }

    function escapeHtml(str) { 
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }

    // drag & drop enhancement
    const uploadArea = document.getElementById('uploadArea');
    uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.style.borderColor = '#c084fc'; uploadArea.style.background = 'rgba(129,140,248,0.15)'; });
    uploadArea.addEventListener('dragleave', () => { uploadArea.style.borderColor = 'rgba(129, 140, 248, 0.6)'; uploadArea.style.background = 'rgba(0,0,0,0.25)'; });
    uploadArea.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadArea.style.borderColor = '#a78bfa';
        if(e.dataTransfer.files.length) {
            selectedFile = e.dataTransfer.files[0];
            document.getElementById('fileName').textContent = selectedFile.name;
            document.getElementById('predictBtn').disabled = false;
            const fileInput = document.getElementById('fileInput');
            const dt = new DataTransfer();
            dt.items.add(selectedFile);
            fileInput.files = dt.files;
        }
        uploadArea.style.background = 'rgba(0,0,0,0.25)';
    });
</script>
</body>
</html>
